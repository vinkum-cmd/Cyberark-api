name: CyberArk Account Export

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cyberark-account-export.yml'
      - 'Get-CyberArkAccounts.ps1'
      - 'Test-RepoHealth.ps1'
      - 'config/cyberark.example.ini'
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Choose validate_only first. Use export only when ready."
        required: true
        default: "validate_only"
        type: choice
        options:
          - validate_only
          - export
      confirm_export:
        description: "Type EXPORT to run Get-CyberArkAccounts.ps1. Leave blank for validate_only."
        required: false
        default: ""
        type: string
      enable_debug:
        description: "Enable script debug logging"
        required: true
        default: false
        type: boolean

jobs:
  cyberark-account-export:
    runs-on: [self-hosted, Windows, X64, cyberark-swaplab]
    timeout-minutes: 60

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CYBERARK_CONFIG_PATH: ${{ vars.CYBERARK_CONFIG_PATH }}
      DEFAULT_CYBERARK_CONFIG_PATH: C:\Users\vinodadmin\Desktop\chatgpt\ChatGPT-Remote\config\cyberark.ini

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve run mode
        shell: powershell
        run: |
          $runMode = '${{ inputs.run_mode }}'
          $confirmExport = '${{ inputs.confirm_export }}'
          $enableDebug = '${{ inputs.enable_debug }}'

          if ([string]::IsNullOrWhiteSpace($runMode)) {
            $runMode = 'validate_only'
          }
          if ([string]::IsNullOrWhiteSpace($enableDebug)) {
            $enableDebug = 'false'
          }

          "RESOLVED_RUN_MODE=$runMode" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RESOLVED_CONFIRM_EXPORT=$confirmExport" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RESOLVED_ENABLE_DEBUG=$enableDebug" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Resolved run mode: $runMode"
          Write-Host "Enable debug: $enableDebug"

      - name: Resolve local CyberArk config path
        id: config
        shell: powershell
        run: |
          $configPath = $env:CYBERARK_CONFIG_PATH
          if ([string]::IsNullOrWhiteSpace($configPath)) {
            $configPath = $env:DEFAULT_CYBERARK_CONFIG_PATH
          }

          Write-Host "Checking config path: $configPath"
          $configAccessible = $false

          try {
            $configAccessible = Test-Path -LiteralPath $configPath -PathType Leaf
          }
          catch {
            Write-Warning "Config path exists check failed or access was denied: $($_.Exception.Message)"
            $configAccessible = $false
          }

          if ($configAccessible) {
            "CONFIG_AVAILABLE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
            "CONFIG_PATH=$configPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "CyberArk config file found and is accessible."
          }
          else {
            "CONFIG_AVAILABLE=false" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Warning "CyberArk config file is not accessible to the GitHub runner service account."
            Write-Host "For export mode, move cyberark.ini to a runner-readable path such as C:\CyberArk\config\cyberark.ini or grant read access to the runner service account."

            if ($env:RESOLVED_RUN_MODE -eq 'export') {
              throw "Export mode requires an accessible CyberArk config file."
            }
          }

      - name: Validate config file shape without printing secrets
        if: ${{ env.CONFIG_AVAILABLE == 'true' }}
        shell: powershell
        run: |
          $content = Get-Content -LiteralPath $env:CONFIG_PATH -Raw

          $requiredPatterns = @(
            '\[CyberArk\]',
            '^\s*PVWA_URL\s*=',
            '^\s*AUTH_TYPE\s*=',
            '^\s*USERNAME\s*='
          )

          foreach ($pattern in $requiredPatterns) {
            if ($content -notmatch $pattern) {
              throw "Config file is missing expected setting pattern: $pattern"
            }
          }

          $pvwaLine = ($content -split "`r?`n") | Where-Object { $_ -match '^\s*PVWA_URL\s*=' } | Select-Object -First 1
          $authLine = ($content -split "`r?`n") | Where-Object { $_ -match '^\s*AUTH_TYPE\s*=' } | Select-Object -First 1
          $userLine = ($content -split "`r?`n") | Where-Object { $_ -match '^\s*USERNAME\s*=' } | Select-Object -First 1
          $passwordLine = ($content -split "`r?`n") | Where-Object { $_ -match '^\s*PASSWORD\s*=' } | Select-Object -First 1

          Write-Host "Config summary:"
          Write-Host "  $pvwaLine"
          Write-Host "  $authLine"
          Write-Host "  USERNAME is set: $($userLine -match '=\s*\S+')"
          Write-Host "  PASSWORD is set: $($passwordLine -match '=\s*\S+')"

          if ($env:RESOLVED_RUN_MODE -eq 'export' -and -not ($passwordLine -match '=\s*\S+')) {
            throw "Export mode requires a non-empty PASSWORD in the local config file or the script must be updated for non-interactive secret retrieval."
          }

      - name: Skip config validation when config is not accessible
        if: ${{ env.CONFIG_AVAILABLE != 'true' }}
        shell: powershell
        run: |
          Write-Host "Config validation skipped because cyberark.ini is not accessible to the runner account."
          Write-Host "Validation-only mode can continue. Export mode will require fixing file permissions or using a runner-readable path."

      - name: Validate PowerShell scripts
        shell: powershell
        run: |
          .\Test-RepoHealth.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: Stop after validation
        if: ${{ env.RESOLVED_RUN_MODE == 'validate_only' }}
        shell: powershell
        run: |
          Write-Host "Validation-only mode selected. No CyberArk export was run."

      - name: Run CyberArk account export
        if: ${{ env.RESOLVED_RUN_MODE == 'export' && env.RESOLVED_CONFIRM_EXPORT == 'EXPORT' && env.CONFIG_AVAILABLE == 'true' }}
        shell: powershell
        run: |
          $argsList = @('-ConfigPath', $env:CONFIG_PATH)
          if ($env:RESOLVED_ENABLE_DEBUG -eq 'true') {
            $argsList += '-EnableDebug'
          }

          Write-Host "Starting CyberArk account export using local config."
          Write-Host "Reports are written by the script to C:\temp\reports on the runner."
          & .\Get-CyberArkAccounts.ps1 @argsList

      - name: Refuse export without explicit confirmation
        if: ${{ env.RESOLVED_RUN_MODE == 'export' && env.RESOLVED_CONFIRM_EXPORT != 'EXPORT' }}
        shell: powershell
        run: |
          throw "Export mode was selected, but confirm_export was not EXPORT. No export was run."

      - name: Refuse export without accessible config
        if: ${{ env.RESOLVED_RUN_MODE == 'export' && env.RESOLVED_CONFIRM_EXPORT == 'EXPORT' && env.CONFIG_AVAILABLE != 'true' }}
        shell: powershell
        run: |
          throw "Export was confirmed, but cyberark.ini is not accessible to the runner account."
