name: Lab Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: [self-hosted, Windows, X64, cyberark-swaplab]

    env:
      PVWA_URL: ${{ vars.PVWA_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner and PowerShell info
        shell: powershell
        run: |
          Write-Host "Runner machine: $env:COMPUTERNAME"
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Write-Host "User: $env:USERNAME"
          $PSVersionTable

      - name: Run repository health check
        shell: powershell
        run: |
          .\Test-RepoHealth.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: Run PVWA connectivity check
        if: ${{ vars.PVWA_URL != '' }}
        shell: powershell
        run: |
          .\Test-CyberArkConnectivity.ps1 -PVWAUrl $env:PVWA_URL -OutputPath .\test-output\cyberark-connectivity-summary.json

      - name: Skip PVWA connectivity check when PVWA_URL is not set
        if: ${{ vars.PVWA_URL == '' }}
        shell: powershell
        run: |
          Write-Host "Repository variable PVWA_URL is not set. Skipping PVWA connectivity check."

      - name: Upload validation output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lab-validation-output
          path: test-output/
          if-no-files-found: ignore
