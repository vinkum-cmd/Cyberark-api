name: Lab Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: [self-hosted, Windows, X64, cyberark-swaplab]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner and PowerShell info
        shell: powershell
        run: |
          Write-Host "Runner machine: $env:COMPUTERNAME"
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Write-Host "User: $env:USERNAME"
          $PSVersionTable

      - name: Run repository health check
        shell: powershell
        run: |
          .\Test-RepoHealth.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: Upload health check output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-health-output
          path: test-output/
          if-no-files-found: ignore
