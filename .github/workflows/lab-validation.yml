name: Lab Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: [self-hosted, Windows, X64, cyberark-swaplab]

    env:
      PVWA_URL: ${{ vars.PVWA_URL }}
      CYBERARK_CONFIG_PATH: ${{ vars.CYBERARK_CONFIG_PATH }}
      DEFAULT_CYBERARK_CONFIG_PATH: C:\Users\vinodadmin\Desktop\chatgpt\ChatGPT-Remote\config\cyberark.ini

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner and PowerShell info
        shell: powershell
        run: |
          Write-Host "Runner machine: $env:COMPUTERNAME"
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Write-Host "User: $env:USERNAME"
          $PSVersionTable

      - name: Run repository health check
        shell: powershell
        run: |
          .\Test-RepoHealth.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: Resolve PVWA URL from variable or local cyberark.ini
        shell: powershell
        run: |
          $resolvedPvwaUrl = $env:PVWA_URL

          $candidateConfigPaths = @()
          if (-not [string]::IsNullOrWhiteSpace($env:CYBERARK_CONFIG_PATH)) {
            $candidateConfigPaths += $env:CYBERARK_CONFIG_PATH
          }
          if (-not [string]::IsNullOrWhiteSpace($env:DEFAULT_CYBERARK_CONFIG_PATH)) {
            $candidateConfigPaths += $env:DEFAULT_CYBERARK_CONFIG_PATH
          }
          $candidateConfigPaths += (Join-Path $env:GITHUB_WORKSPACE 'config\cyberark.ini')
          $candidateConfigPaths += (Join-Path $env:GITHUB_WORKSPACE 'cyberark.ini')

          $candidateConfigPaths = $candidateConfigPaths | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique

          Write-Host "PVWA_URL variable set: $(-not [string]::IsNullOrWhiteSpace($resolvedPvwaUrl))"
          Write-Host "Checking candidate cyberark.ini paths:"
          foreach ($candidate in $candidateConfigPaths) {
            if (Test-Path -LiteralPath $candidate -PathType Leaf) {
              Write-Host "  FOUND: $candidate"
            }
            else {
              Write-Host "  MISSING: $candidate"
            }
          }

          if ([string]::IsNullOrWhiteSpace($resolvedPvwaUrl)) {
            $configPath = $candidateConfigPaths | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } | Select-Object -First 1

            if ($configPath) {
              Write-Host "Reading PVWA_URL from local config file."
              $configLines = Get-Content -LiteralPath $configPath
              $pvwaLine = $configLines | Where-Object { $_ -match '^\s*PVWA_URL\s*=' } | Select-Object -First 1

              if ($pvwaLine) {
                $resolvedPvwaUrl = ($pvwaLine -replace '^\s*PVWA_URL\s*=\s*', '').Trim().Trim('"')
              }
              else {
                Write-Warning "No PVWA_URL entry was found in the discovered config file."
              }
            }
            else {
              Write-Warning "No local cyberark.ini file was found in the candidate paths."
            }
          }

          if ([string]::IsNullOrWhiteSpace($resolvedPvwaUrl)) {
            Write-Host "PVWA URL was not provided. Skipping PVWA connectivity check."
            "PVWA_CONNECTIVITY_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          else {
            Write-Host "PVWA URL was resolved. Connectivity check will run."
            "PVWA_CONNECTIVITY_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Append
            "RESOLVED_PVWA_URL=$resolvedPvwaUrl" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Run PVWA connectivity check diagnostic
        if: ${{ env.PVWA_CONNECTIVITY_ENABLED == 'true' }}
        shell: powershell
        run: |
          try {
            .\Test-CyberArkConnectivity.ps1 -PVWAUrl $env:RESOLVED_PVWA_URL -OutputPath .\test-output\cyberark-connectivity-summary.json
          }
          catch {
            Write-Warning "PVWA connectivity diagnostic reported an issue: $($_.Exception.Message)"
            Write-Host "The workflow will continue so artifacts/logs can be reviewed."
          }

      - name: Skip PVWA connectivity check
        if: ${{ env.PVWA_CONNECTIVITY_ENABLED != 'true' }}
        shell: powershell
        run: |
          Write-Host "Skipping PVWA connectivity check. Provide PVWA_URL or a reachable cyberark.ini path."

      - name: Upload validation output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lab-validation-output
          path: test-output/
          if-no-files-found: ignore
